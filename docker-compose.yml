# ============================================================
# GST Reconciliation Agent — Docker Compose
# ============================================================
# All 5 application services on a shared network.
# External dependencies (Supabase, CloudAMQP, Gemini, Groq)
# are configured via .env — no local DB or RabbitMQ needed.
#
# Usage:
#   docker-compose up --build -d       ← build + start in background
#   docker-compose up gateway          ← start single service
#   docker-compose logs -f             ← follow all logs
#   docker-compose down                ← stop everything
#   docker-compose ps                  ← check status
# ============================================================

version: "3.9"

x-common: &common
  env_file: .env
  restart: unless-stopped
  networks:
    - gst-net
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ── Ingestion Service (port 8001) ─────────────────────
  ingestion:
    <<: *common
    build:
      context: .
      dockerfile: ingestion_service/Dockerfile
    container_name: gst_ingestion
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - PYTHONPATH=/app

  # ── Orchestration Service (port 8002) ─────────────────
  orchestration:
    <<: *common
    build:
      context: .
      dockerfile: orchestration_service/Dockerfile
    container_name: gst_orchestration
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      - PYTHONPATH=/app

  # ── Notification Service (port 8003) ──────────────────
  notification:
    <<: *common
    build:
      context: .
      dockerfile: notification_service/Dockerfile
    container_name: gst_notification
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - PYTHONPATH=/app

  # ── Report Service (port 8004) ────────────────────────
  report:
    <<: *common
    build:
      context: .
      dockerfile: report_service/Dockerfile
    container_name: gst_report
    ports:
      - "8004:8004"
    volumes:
      - ./reports:/app/reports    # Persist generated PDF/Excel reports
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - PYTHONPATH=/app

  # ── API Gateway (port 8080) ───────────────────────────
  gateway:
    <<: *common
    build:
      context: .
      dockerfile: gateway_service/Dockerfile
    container_name: gst_gateway
    ports:
      - "8080:8080"
    depends_on:
      ingestion:
        condition: service_healthy
      orchestration:
        condition: service_healthy
      notification:
        condition: service_healthy
      report:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
    environment:
      - PYTHONPATH=/app

networks:
  gst-net:
    driver: bridge
